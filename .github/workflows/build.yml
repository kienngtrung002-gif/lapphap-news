name: Tao sach EPUB tu dong

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Calibre trên máy ảo
        run: |
          sudo apt-get update
          sudo apt-get install -y calibre

      - name: Chạy công thức tạo sách EPUB có gắn ngày tháng
        run: |
          TODAY=$(date +'%d_%m_%Y')
          ebook-convert lapphap.recipe lapphap_$TODAY.epub
          
      - name: Tạo kho thư viện ảo (OPDS) chuẩn XML cho KOReader
        run: |
          TODAY=$(date +'%d_%m_%Y')
          DATETIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          mkdir public
          cp lapphap_$TODAY.epub public/
          
          # Tạo file thư viện chuẩn OPDS
          cat <<EOF > public/atom.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <feed xmlns="http://www.w3.org/2005/Atom" xmlns:opds="http://opds-spec.org/2010/catalog">
            <id>urn:uuid:lapphap-news</id>
            <title>Báo Cập Nhật Tự Động</title>
            <updated>${DATETIME}</updated>
            <author><name>Hệ thống tự động</name></author>
            <link rel="self" href="atom.xml" type="application/atom+xml;profile=opds-catalog;kind=navigation"/>
            <link rel="start" href="atom.xml" type="application/atom+xml;profile=opds-catalog;kind=navigation"/>
            <entry>
              <title>Tạp chí Lập pháp (Bản ngày $(date +'%d/%m/%Y'))</title>
              <id>lapphap_${TODAY}</id>
              <updated>${DATETIME}</updated>
              <content type="text">Đóng gói tự động từ lapphap.vn</content>
              <link rel="http://opds-spec.org/acquisition" href="lapphap_${TODAY}.epub" type="application/epub+zip"/>
            </entry>
          </feed>
          EOF

      - name: Thiết lập GitHub Pages
        uses: actions/configure-pages@v4

      - name: Đóng gói file tải lên
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Xuất bản lên web
        id: deployment
        uses: actions/deploy-pages@v4
